# flutter_launcher_icons.yaml
flutter_launcher_icons:
  image_path: "assets/icon.png"
  
  # Android specific
  android: true
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_background: "#00000000"  # Transparent
  adaptive_icon_padding: 0%              # NO padding!
  min_sdk_android: 21                    # Adaptive icons API level
  
  # Make sure foreground fills the mask
  android_adaptive_icon_generate: true
  android_adaptive_icon_keep_foreground_layer: true
  
  # iOS specific
  ios: true
  remove_alpha_ios: true